name = "internmanagement"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

routes = [
  { pattern = "internmanagement.abdulkareem-t.workers.dev", custom_domain = true }
]

[assets]
directory = ".open-next/assets"

[[d1_databases]]
binding = "DB"
database_name = "internmanagementdata"
database_id = "c97be9fd-09a6-4dc4-b2ab-593fad26516f"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "replace-with-cache-kv-id"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "replace-with-rate-limit-kv-id"

[vars]
JWT_SECRET = "change-me"
OTP_SECRET = "change-me"
RESEND_FROM_EMAIL = "noreply@aureliv.in"
