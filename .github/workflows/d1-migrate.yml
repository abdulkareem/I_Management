name: Apply D1 Migrations

on:
  push:
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Apply migrations
        run: |
          echo "Starting D1 migration apply..."
          wrangler d1 migrations apply internmanagementdata --remote
          echo "D1 migration apply completed successfully."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Validate migrated tables
        run: |
          echo "Verifying tables in D1 after migration..."
          wrangler d1 execute internmanagementdata --remote --command "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name;"
          echo "Table verification query completed."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
